<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Client Spaitra - Accès Banque</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Client Spaitra</h1>
        <p>Interface de réclamation client</p>
    </header>

    <main>
        <div class="card">
            <h2>Nouvelle réclamation</h2>
            <form>
                <input type="text" placeholder="Nom complet" required>
                <input type="email" placeholder="Email" required>
                <textarea placeholder="Décrivez votre réclamation" required></textarea>
                <button type="submit">Envoyer</button>
            </form>
        </div>
    </main>

</body>
</html>
