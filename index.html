<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Client Spaitra — Demande & Réclamation</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <canvas id="bg"></canvas>

  <div class="shell">

    <header class="topbar">
      <div class="brand">
        <!-- LOGO SANS CADRE -->
        <img src="logo.png" alt="Logo Banque" class="logoImg" />

        <div class="brandText">
          <div class="brandTitle">Client Spaitra</div>
          <div class="brandSub">Demande de rendez-vous • Réclamation • Informations</div>
        </div>
      </div>
    </header>

    <main class="mainVertical">
      <section class="cardVertical">

        <h2>Vos informations</h2>

        <div class="grid2">
          <div class="f">
            <input id="prenom" type="text" placeholder=" " required />
            <label>Prénom *</label>
          </div>

          <div class="f">
            <input id="nom" type="text" placeholder=" " required />
            <label>Nom *</label>
          </div>

          <div class="f">
            <input id="email" type="email" placeholder=" " required />
            <label>E-mail *</label>
            <small id="emailHint" class="hint"></small>
          </div>

          <div class="f">
            <input id="tel" type="tel" placeholder=" " required />
            <label>Téléphone *</label>
            <small id="telHint" class="hint"></small>
          </div>

          <div class="f full">
            <input id="societe" type="text" placeholder=" " />
            <label>Ma société (optionnel)</label>
          </div>
        </div>

        <h2 class="sectionTitle">Votre demande</h2>

        <div class="radioRow">
          <label class="radio">
            <input type="radio" name="type" value="rdv" />
            <span>Prendre rendez-vous</span>
          </label>

          <label class="radio">
            <input type="radio" name="type" value="reclamation" />
            <span>Faire une réclamation</span>
          </label>

          <label class="radio">
            <input type="radio" name="type" value="info" />
            <span>Demander une information</span>
          </label>
        </div>

        <textarea id="message" rows="6"
          placeholder="Décrivez votre demande (min. 10 caractères)."></textarea>

        <div class="actions">
          <label class="check">
            <input id="human" type="checkbox" />
            <span>Je confirme que je suis humain</span>
          </label>

          <button id="send" disabled>Envoyer</button>
        </div>

        <div id="toast" class="toast hidden"></div>

      </section>
    </main>

    <footer class="foot">
      © Accès Banque — Client Spaitra
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
